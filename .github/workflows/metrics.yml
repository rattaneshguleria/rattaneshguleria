name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # Main dashboard: header + activity + languages + notable repos
      - name: Main metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: dist/metrics.svg
          template: classic
          config_display: compact
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: percentage
          plugin_notable: yes
          plugin_notable_indepth: yes

      # Full-year contribution calendar (isocalendar view)
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: dist/isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Coding habits: most active hours/days, indentation style, etc.
      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: dist/habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_charts_type: bar
          plugin_habits_days: 14
          plugin_habits_facts: yes
